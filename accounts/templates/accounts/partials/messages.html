{% load i18n %}

{% if messages %}
    <section class="message-region container" aria-label="{% trans 'Notifications' %}" aria-live="polite" aria-atomic="true">
        {% for message in messages %}
            {% with message_text=message|stringformat:"s" %}
            <div class="notice notice--{{ message.tags|default:'info' }}" role="{% if 'error' in message.tags %}alert{% else %}status{% endif %}">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20ZM12 8v5M12 16h.01"/>
                </svg>
                <p>{% trans message_text %}</p>
            </div>
            {% endwith %}
        {% endfor %}
    </section>
{% endif %}
